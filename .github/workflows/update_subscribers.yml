name: Update Subscriber Count

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and update subscriber count via API
        run: |
          python3 << 'EOF'
import json, urllib.request, base64
from datetime import datetime, timezone

dc = "${{ secrets.MAILCHIMP_DC }}"
list_id = "${{ secrets.MAILCHIMP_LIST_ID }}"
api_key = "${{ secrets.MAILCHIMP_API_KEY }}"
token = "${{ secrets.PAT_TOKEN }}"
repo = "${{ github.repository }}"

# Fetch Mailchimp count
url = f"https://{dc}.api.mailchimp.com/3.0/lists/{list_id}"
req = urllib.request.Request(url, headers={"Authorization": f"Basic {base64.b64encode(('anystring:' + api_key).encode()).decode()}"})
count = json.load(urllib.request.urlopen(req))["stats"]["member_count"]
now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
content = json.dumps({"count": count, "updated": now})

# Get current SHA
url = f"https://api.github.com/repos/{repo}/contents/subscribers.json"
headers = {"Authorization": f"Bearer {token}", "Accept": "application/vnd.github.v3+json"}
req = urllib.request.Request(url, headers=headers)
sha = json.load(urllib.request.urlopen(req))["sha"]

# Update file
data = json.dumps({
    "message": "update subscriber count",
    "content": base64.b64encode(content.encode()).decode(),
    "sha": sha,
    "branch": "master"
}).encode()
req = urllib.request.Request(url, data=data, method="PUT", headers=headers)
result = json.load(urllib.request.urlopen(req))
print(f"Updated! Count: {count}, SHA: {result['content']['sha'][:8]}...")
EOF
