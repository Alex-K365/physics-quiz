:root{--bg:#f0f4fa;--card:rgba(255,255,255,0.75);--text:#1a2c3e;--text2:#4a627a;--border:rgba(255,255,255,0.45);--shadow:0 8px 32px rgba(0,0,0,0.08);--input-bg:#fff;--accent:#1f6392}
[data-theme=dark]{--bg:#0b1120;--card:rgba(18,25,45,0.8);--text:#f0f3fa;--text2:#9aaec9;--border:rgba(72,92,128,0.4);--shadow:0 12px 40px rgba(0,0,0,0.4);--input-bg:rgba(18,25,45,0.6);--accent:#7ab7d4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Noto Sans TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:.3s;padding:20px}
.table-wrap{max-width:1200px;margin:0 auto}
h1{font-size:24px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,var(--accent),#c9a227);background-clip:text;-webkit-background-clip:text;color:transparent}
.sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.top-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.search{flex:1;min-width:160px;padding:8px 14px;border:1px solid var(--border);border-radius:12px;font-size:14px;background:var(--input-bg);color:var(--text);outline:none;font-family:inherit}
.btn{padding:7px 18px;border:none;border-radius:60px;font-size:13px;font-weight:600;cursor:pointer;background:var(--card);color:var(--text);border:1px solid var(--border);transition:.2s}
.btn:hover{background:var(--accent);color:#fff}
.btn.active{background:var(--accent);color:#fff}
.grid{display:grid;grid-template-columns:repeat(18,1fr);gap:2px;margin-bottom:12px}
.el{aspect-ratio:1;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:9px;font-weight:600;transition:.15s;position:relative;min-height:38px;border:1px solid transparent}
.el:hover{transform:scale(1.25);z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.el .sym{font-size:13px;font-weight:700;line-height:1.1}
.el .num{font-size:7px;opacity:.7;position:absolute;top:2px;left:3px}
.el.empty{background:transparent!important;cursor:default}
.el.empty:hover{transform:none;box-shadow:none}
.detail{display:none;background:var(--card);backdrop-filter:blur(14px);border-radius:20px;padding:20px;border:1px solid var(--border);box-shadow:var(--shadow);margin-top:12px;transition:.3s}
.detail.show{display:block}
.detail h2{font-size:28px;font-weight:800}
.detail .subtitle{font-size:14px;color:var(--text2);margin-bottom:12px}
.detail table{width:100%;border-collapse:collapse;font-size:13px}
.detail td{padding:6px 12px;border-bottom:1px solid var(--border)}
.detail td:first-child{font-weight:600;width:100px;color:var(--text2)}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;font-size:11px}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:14px;height:14px;border-radius:3px}
.ft{text-align:center;font-size:12px;color:var(--text2);margin-top:16px}
.ft a{color:var(--accent)}

/* Element colors */
.alkali{background:#ff6b6b;color:#fff}
.alkaline{background:#ff9f43;color:#fff}
.transition{background:#54a0ff;color:#fff}
.post-transition{background:#5f27cd;color:#fff}
.metalloid{background:#00d2d3;color:#000}
.nonmetal{background:#1dd1a1;color:#000}
.halogen{background:#f368e0;color:#fff}
.noble{background:#8395a7;color:#fff} 
.lanthanide{background:#ff9ff3;color:#000}
.actinide{background:#c44569;color:#fff}
.unknown{background:#bbb;color:#fff}
</style>

const CATS = {alkali:"鹼金屬",alkaline:"鹼土金屬",transition:"過渡金屬","post-transition":"貧金屬",metalloid:"類金屬",nonmetal:"非金屬",halogen:"鹵素",noble:"貴氣體",lanthanide:"鑭系元素",actinide:"錒系元素",unknown:"未知性質"};
const CAT_COLORS = {alkali:"#ff6b6b",alkaline:"#ff9f43",transition:"#54a0ff","post-transition":"#5f27cd",metalloid:"#00d2d3",nonmetal:"#1dd1a1",halogen:"#f368e0",noble:"#8395a7",lanthanide:"#ff9ff3",actinide:"#c44569",unknown:"#bbb"};

function renderGrid(filter=""){
  const grid=document.getElementById("grid");
  const f=filter.toLowerCase();
  let html="";
  const positions={};
  ELEMENTS.forEach(el=>{
    const key=el.per+"-"+el.grp;
    positions[key]=el;
  });
  // Lanthanide/Actinide rows
  const lanAct={};
  ELEMENTS.filter(e=>e.per>=8).forEach(e=>lanAct[e.grp]=e);
  
  for(let r=1;r<=7;r++){
    for(let c=1;c<=18;c++){
      const key=r+"-"+c;
      const el=positions[key];
      if(el){
        const match=!f||el.name.includes(f)||el.sym.toLowerCase().includes(f)||el.en.toLowerCase().includes(f);
        const catClass=el.cat;
        html+=`<div class="el ${catClass}" onclick="showDetail(${el.num})" style="${match?'':'display:none'}"><span class="num">${el.num}</span><span class="sym">${el.sym}</span></div>`;
      } else if((r===6||r===7)&&c>=4&&c<=18){
        const extraKey=(r===6?"lan":"act")+"-"+c;
        const el2=lanAct[c];
        if(el2){
          const match=!f||el2.name.includes(f)||el2.sym.toLowerCase().includes(f)||el2.en.toLowerCase().includes(f);
          html+=`<div class="el ${el2.cat}" onclick="showDetail(${el2.num})" style="${match?'':'display:none'}"><span class="num">${el2.num}</span><span class="sym">${el2.sym}</span></div>`;
        } else html+=`<div class="el empty"></div>`;
      } else html+=`<div class="el empty"></div>`;
    }
  }
  grid.innerHTML=html;
}

function renderLegend(){
  const leg=document.getElementById("legend");
  leg.innerHTML=Object.keys(CATS).map(k=>`<span class="legend-item"><span class="legend-dot" style="background:${CAT_COLORS[k]}"></span>${CATS[k]}</span>`).join("");
}

let currentEl=null;
function showDetail(num){
  const el=ELEMENTS.find(e=>e.num===num);
  if(!el)return;
  currentEl=el;
  const d=document.getElementById("detail");
  const massVal=el.mass.startsWith("[")?el.mass+"（放射性）":el.mass;
  d.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <div style="width:56px;height:56px;border-radius:12px;background:${CAT_COLORS[el.cat]};display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;color:#fff">
        <div style="font-size:22px">${el.sym}</div>
        <div style="font-size:9px;opacity:.8">${el.num}</div>
      </div>
      <div>
        <h2>${el.name} <span style="font-size:14px;font-weight:400;color:var(--text2)">${el.en}</span></h2>
        <div style="font-size:13px;color:var(--text2)">${CATS[el.cat]} | 第${el.per}週期 · 第${el.grp}族</div>
      </div>
    </div>
    <table>
      <tr><td>原子序</td><td>${el.num}</td></tr>
      <tr><td>原子量</td><td>${massVal}</td></tr>
      <tr><td>電子組態</td><td>${el.cfg}</td></tr>
      <tr><td>熔點</td><td>${el.mp}</td></tr>
      <tr><td>沸點</td><td>${el.bp}</td></tr>
      <tr><td>密度</td><td>${el.dens}</td></tr>
      <tr><td>發現年份</td><td>${el.disc}</td></tr>
    </table>`;
  d.classList.add("show");
}

function filterElements(){
  const val=document.getElementById("search").value;
  renderGrid(val);
}

let dark=false;
function toggleTheme(){
  dark=!dark;
  document.documentElement.setAttribute("data-theme",dark?"dark":"light");
}

renderGrid();
renderLegend();
showDetail(1);
